{% extends 'base.html' %}
{% block titulo %}Luppy | Iniciar Sesión{% endblock %}
{% load crispy_forms_tags %}

{% block inicio %}
<div class="container">
    <h2>Iniciar Sesión</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-success">Entrar</button>
    </form>
</div>
{% endblock %}
